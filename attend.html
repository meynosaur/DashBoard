<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"

</head>
<style>
    * {
        margin: 0;
        padding: 0;
    }
    .nav-link:hover { background-color: rgba(255, 255, 255, 0.08); }
    button.bun:hover{
        color: rgb(155, 67, 67);
        background-color: rgb(65, 35, 35);
    }
</style>

<body>
    <div class="w-100 d-flex">
        <aside style="width: 15%; height: 100vh;">
            <div class="w-100 h-100 d-flex flex-column pt-4"

                </div>
                <hr class="w-100 border-secondary">
                <div class="d-flex ps-5 gap-3">
                    <img class="rounded-5 " style="width: 40px; height: 40px;"

                    <div class="d-flex flex-column">

                </div>

                <div class="d-flex ps-4 gap-3">

                    </a>
                </div>
                <div class="container-fluid d-flex ps-4 gap-3">
                    <a href="student.html"class="nav-link text-secondary rounded-3 d-flex align-items-center gap-3  text-light" style="width: 250px; height: 40px;">
                        <i class="fa-solid fa-people-group ps-4"></i>Students
                    </a>
                </div>
                <div class="d-flex ps-4 gap-3">
                    <a href="teacher.html"class="nav-link text-secondary rounded-3 d-flex align-items-center gap-3  text-light" style="width: 250px; height: 45px;">

                    </a>
                </div>
                <div class="d-flex ps-4 gap-3">
                    <a href="class.html"class="nav-link text-secondary rounded-3 d-flex align-items-center gap-3  text-light" style="width: 250px; height: 45px;">

                </div>
                <div class="d-flex ps-4 gap-3">

                    </a>
                </div>
                <div class="d-flex ps-4 gap-3">
                    <a href="attend.html"class="nav-link text-secondary rounded-3 d-flex align-items-center gap-3  text-light" style="width: 250px; height: 45px;">

                    </a>
                </div>
                <div class="d-flex ps-4 gap-3">
                    <a href="grade.html"class="nav-link text-secondary rounded-3 d-flex align-items-center gap-3  text-light" style="width: 250px; height: 45px;">

                </div>

                        <div class="d-flex flex-column">
                            <label class="text-light fw-semibold">meynosaur</label>

                        <div class="img">
                            <img src="https://i.pinimg.com/736x/ae/7e/0d/ae7e0df6dc6c188e1d897f3dc1ba0884.jpg"

                        </div>
                        <div class="vr text-secondary"></div>
                        <a href="#" class="nav-link text-secondary fs-4"><i class='bx bxs-moon'></i></a>
                    </div>
                </div>
            </nav>
            <div class="container-fluid px-4">
                <h1 class="text-light fw-bold p-4">Attendance Tracker</h1>
                <p class="text-secondary ps-4">Mark and track attendance across all classes.</p>
            </div>
        </div>

</html>
